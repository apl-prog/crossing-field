<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Liberando: Crossing Field</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="overlay" class="overlay">
    <div class="panel">
      <div class="title">LIBERANDOS: CROSSING FIELD</div>
      <div id="overlayMsg" class="msg">Tap to start</div>
      <button id="startBtn" class="startBtn">START</button>
      <div class="hintSmall">Direct the recovery operator to safety</div>
    </div>
  </div>

  <canvas id="game" width="512" height="512"></canvas>

  <div class="ui">
    <div id="status">STANDBY</div>
    <div id="integrity">INTEGRITY: 100%</div>
  </div>

  <script src="audio.js?v=1"></script>
<script src="game.js?v=1"></script>
</body>
</html>
